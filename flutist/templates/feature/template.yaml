# ─────────────────────────────────────────────────────────────────────────────
# Flutist Scaffold Template
#
# This file was generated by `flutist init` as a starter example.
# Customize it freely to match your project conventions.
#
# Usage:
#   flutist scaffold feature --name login
#   flutist scaffold feature --name login --path lib/features
# ─────────────────────────────────────────────────────────────────────────────

description: "Widget template — customize this to match your project conventions"

# ── Attributes ───────────────────────────────────────────────────────────────
# Variables passed via CLI (e.g. --name login --path lib/features).
# Each attribute becomes a {{variable}} you can use in paths and .template files.
#
# Fields:
#   name        - attribute key (used as {{name}} in templates)
#   required    - if true, CLI must provide it or prompt will ask
#   default     - fallback value when not provided (only for required: false)
#   description - shown in `flutist scaffold list` and prompts
attributes:
  - name: name
    required: true

  - name: path
    description: "Output directory for generated files"
    required: false
    default: "lib/widgets"

# ── Items ─────────────────────────────────────────────────────────────────────
# Files to generate. Two types are supported:
#
#   type: file
#     Reads a .template file and writes it to `path` after variable substitution.
#     templatePath  - relative path to the .template file inside this directory
#     if            - optional condition; skip this item if false
#                     syntax: "attributeKey == \'value\'"
#
#   type: string
#     Writes inline content directly to `path` — no .template file needed.
#     contents      - the inline text (supports {{variables}})
#
# Variable syntax in paths and template files:
#   {{name}}               → snake_case   (e.g. user_profile)
#   {{name | pascal_case}} → PascalCase   (e.g. UserProfile)
#   {{name | camel_case}}  → camelCase    (e.g. userProfile)
#   {{name | upper_case}}  → UPPER_CASE   (e.g. USER_PROFILE)
#   {{path}}               → value of the path attribute
#   {{myAttr}}             → value of any custom attribute
items:
  - type: file
    path: "{{path}}/{{name | snake_case}}_widget.dart"
    templatePath: "widget.dart.template"

  - type: string
    path: "{{path}}/{{name | snake_case}}/README.md"
    contents: |
      # {{name | pascal_case}}

      Auto-generated widget. Edit this template at flutist/templates/feature/.
